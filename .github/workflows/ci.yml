name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build, Test & Package
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16 (Swift 6)
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show Swift version
        run: swift --version

      - name: Run Tests
        run: swift test > test_output.log 2>&1 || (cat test_output.log && exit 1)

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Logs
          path: test_output.log

      - name: Package DMG (Ad-hoc)
        run: ./scripts/ci-dmg.sh

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteMonk-macOS-DMG
          path: build/*.dmg
