name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16 (Swift 6)
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
